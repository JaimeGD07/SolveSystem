<header class="h-20 bg-white border-b border-gray-200 px-8 flex items-center justify-between font-sans shadow-sm z-10">

  <div class="flex flex-col">
    <h2 class="text-lg font-bold text-solve-primary">Panel de {{ userRoleText() }}</h2>
    <p class="text-xs font-semibold text-solve-primary tracking-wide">
      {{ currentDate() }} | Usuario: {{ userEmail() }}
    </p>
  </div>

  <div class="flex items-center gap-4">
    <button class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-gray-300 text-sm font-bold text-solve-dark hover:bg-gray-50 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
      EN
    </button>
    <button class="flex items-center justify-center w-9 h-9 rounded-full border border-gray-300 hover:bg-gray-50 transition-colors text-solve-dark">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
    </button>

    <button (click)="onLogout()" class="flex items-center gap-2 px-4 py-2 border border-solve-dark rounded-full text-sm font-bold text-solve-dark hover:bg-red-50 hover:text-red-600 hover:border-red-600 transition-colors ml-2">
      Cerrar Sesión
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
    </button>
  </div>

</header>
